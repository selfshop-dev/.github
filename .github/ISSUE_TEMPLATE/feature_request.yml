name: Feature request
description: Предложить новую функциональность или улучшение
title: "feat: "
labels:
  - ✨ Feature
body:
  - type: markdown
    attributes:
      value: |
        **Спасибо за предложение новой фичи!** 🚀

  - type: textarea
    id: problem
    attributes:
      label: Проблема / сценарий использования
      description: Для чего нужна эта функция? Какой pain point она решает?
      placeholder: "Сейчас сложно делать X, потому что..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Предлагаемое решение
      description: Как именно должна работать новая функциональность?
      placeholder: "Добавить кнопку / API-метод / опцию в настройках..."

  - type: textarea
    id: benefits
    attributes:
      label: Преимущества
      description: Почему это важно для пользователей и проекта?

  - type: textarea
    id: alternatives
    attributes:
      label: Альтернативные решения
      description: Что вы уже пробовали или рассматривали?

  - type: textarea
    id: additional
    attributes:
      label: Дополнительная информация
      description: Примеры, ссылки, приоритет

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист перед отправкой
      options:
        - label: Я проверил, что похожей функции ещё нет в issues
          required: true