name: Question
description: Вопрос по использованию или архитектуре
title: "question: "
labels:
  - 📚 Documentation
body:
  - type: markdown
    attributes:
      value: |
        **💡 Лучше всего задавать вопросы в** [`GitHub Discussions`](https://github.com/selfshop-dev/discussions) — там быстрее ответят и сообщество, и мейнтейнеры.

        Но если вам удобнее создать issue — заполните форму ниже.

  - type: textarea
    id: question
    attributes:
      label: Ваш вопрос
      description: Что именно вас интересует?
      placeholder: "Как правильно настроить ...?"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: Версия проекта, что вы уже пробовали, окружение
      placeholder: "Использую v1.2.3, пробовал через API..."

  - type: textarea
    id: additional
    attributes:
      label: Дополнительная информация
      description: Скриншоты, фрагменты кода, ссылки

  - type: checkboxes
    id: checklist
    attributes:
      label: Чек-лист перед отправкой
      options:
        - label: Я поискал ответ в документации и существующих issues
          required: true